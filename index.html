<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Егор & Валерия — Приглашение</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@300;400&display=swap');
    * { box-sizing: border-box; }
    body { background: #1a1008; color: #e8d5a3; font-family: 'Raleway', sans-serif; margin:0; }

    /* Анимация появления */
    .fade-in { opacity: 0; transform: translateY(20px); transition: all 1s ease-out; }
    .visible { opacity: 1; transform: translateY(0); }

    .container { max-width: 500px; margin: 0 auto; padding: 40px 20px; text-align: center; }

    /* Счетчик */
    .timer { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
    .timer-item { font-family: 'Cormorant Garamond', serif; font-size: 20px; }
    
    /* Кнопки */
    .btn-map { background: #b8945a; color: #1a1008; padding: 15px 30px; border: none; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; display: inline-block; text-decoration: none; }

    /* Футтер */
    .footer { margin-top: 60px; font-size: 12px; color: #7a6840; border-top: 1px solid #3a2a1a; padding-top: 20px; }

    .music-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0804; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .music-box { width: 100%; max-width: 350px; background: #2a1a08; border: 1px solid #b8945a; padding: 40px; text-align: center; }
    .btn-action { display: block; width: 100%; padding: 15px; border: 1px solid #b8945a; background: #b8945a; color: #1a1008; margin-bottom: 10px; cursor: pointer; }
    .btn-skip { background: transparent; color: #b8945a; }
  </style>
</head>
<body>

<div class="music-overlay" id="musicOverlay">
  <div class="music-box">
    <h2 style="font-family:'Cormorant Garamond',serif; margin-bottom:20px;">Добро пожаловать</h2>
    <button class="btn-action" onclick="initMusic(true)">Включить музыку ♡</button>
    <button class="btn-action btn-skip" onclick="initMusic(false)">Без музыки</button>
  </div>
</div>

<div class="container">
  <div class="fade-in">
    <h1>Егор & Валерия</h1>
    <p>До свадьбы осталось:</p>
    <div class="timer" id="timer">
      <div class="timer-item" id="days">00 д</div>
      <div class="timer-item" id="hours">00 ч</div>
      <div class="timer-item" id="mins">00 м</div>
    </div>
  </div>

  <div class="fade-in">
    <p>Казань, ул. Пушкина, 52</p>
    <a href="https://yandex.ru/maps/-/CCUuv6d9XD" class="btn-map" target="_blank">Открыть маршрут</a>
  </div>

  <div class="footer">
    <p>© 2026. Создано Женихом — Яшин Егор</p>
  </div>
</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

<script>
  // Счетчик
  const weddingDate = new Date("2026-10-01T17:00:00");
  function updateTimer() {
    const now = new Date();
    const diff = weddingDate - now;
    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / 1000/60) % 60);
    document.getElementById('days').innerText = d + " д";
    document.getElementById('hours').innerText = h + " ч";
    document.getElementById('mins').innerText = m + " м";
  }
  setInterval(updateTimer, 1000);

  // Музыка и появление
  function initMusic(play) {
    document.getElementById('musicOverlay').style.display = 'none';
    if(play) document.getElementById('bgMusic').play();
    // Активируем анимацию появления
    document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
  }
</script>
</body>
</html>
