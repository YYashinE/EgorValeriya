<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Егор & Валерия — Приглашение на свадьбу</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .invite-wrap {
      background: #1a1008;
      min-height: 100vh;
      font-family: 'Raleway', sans-serif;
      color: #e8d5a3;
      position: relative;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #e8d5a3;
      border-radius: 50%;
      opacity: 0.25;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.45; }
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 24px 40px;
      border-bottom: 0.5px solid rgba(232, 213, 163, 0.15);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #b8945a;
      margin-bottom: 24px;
    }

    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: #f0e2b8;
      margin-bottom: 8px;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 400;
      color: #e8d5a3;
      letter-spacing: 6px;
      margin-bottom: 32px;
    }

    .amp { font-style: italic; color: #b8945a; font-weight: 300; letter-spacing: 2px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .divider-line {
      width: 80px; height: 0.5px;
      background: linear-gradient(to right, transparent, #b8945a);
    }

    .divider-line.right { background: linear-gradient(to left, transparent, #b8945a); }

    .divider-diamond {
      width: 6px; height: 6px;
      background: #b8945a;
      transform: rotate(45deg);
    }

    .invite-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: #c8b87a;
      line-height: 1.8;
      max-width: 420px;
      margin: 0 auto;
    }

    /* SLIDER SECTION */
    .photo-section {
      position: relative;
      z-index: 1;
      padding: 32px 24px 0;
      text-align: center;
    }

    .slider-frame {
      display: inline-block;
      max-width: 420px;
      width: 100%;
      border: 0.5px solid rgba(184, 148, 90, 0.35);
      border-radius: 2px;
      padding: 3px;
      background: #2a1a08;
      position: relative;
      overflow: hidden;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 480px;
      border-radius: 1px;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: block;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: sepia(20%) brightness(0.88) contrast(1.05);
    }

    .photo-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(26,16,8,0.9) 0%, rgba(26,16,8,0.3) 60%, transparent 100%);
      padding: 40px 24px 24px;
      pointer-events: none;
      z-index: 2;
    }

    .photo-caption {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      color: #f0e2b8;
      line-height: 1.5;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(26, 16, 8, 0.4);
      border: 0.5px solid rgba(184, 148, 90,
